<app-page-shell [title]="'nav.admin.users' | translate" [subtitle]="'admin.users.subtitle' | translate">
  <section class="glass-panel rounded-2xl border border-slate-300/40 p-4 space-y-4">
    <form [formGroup]="form" (ngSubmit)="applyFilters()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
      <div class="space-y-2">
        <label class="text-sm">{{ 'common.search' | translate }}</label>
        <input pInputText formControlName="search" class="w-full" />
      </div>

      <div class="space-y-2">
        <label class="text-sm">{{ 'admin.users.role' | translate }}</label>
        <p-select formControlName="role" [options]="roleOptions" optionLabel="label" optionValue="value" class="w-full"></p-select>
      </div>

      <div class="space-y-2">
        <label class="text-sm">{{ 'admin.users.country' | translate }}</label>
        <input pInputText formControlName="country" class="w-full" />
      </div>

      <div class="space-y-2">
        <label class="text-sm">{{ 'common.perPage' | translate }}</label>
        <p-inputNumber formControlName="per_page" [min]="1" [useGrouping]="false" class="w-full"></p-inputNumber>
      </div>

      <button pButton type="submit" [label]="'common.apply' | translate" [loading]="loading()"></button>
    </form>

    <app-data-state [loading]="loading()" [error]="error()" [empty]="(result()?.data?.length ?? 0) === 0" emptyTextKey="common.noResults">
      <p-table [value]="result()?.data ?? []" [tableStyle]="{ 'min-width': '50rem' }" responsiveLayout="scroll">
        <ng-template pTemplate="header">
          <tr>
            <th>{{ 'auth.name' | translate }}</th>
            <th>{{ 'auth.email' | translate }}</th>
            <th>{{ 'admin.users.role' | translate }}</th>
            <th>{{ 'admin.users.country' | translate }}</th>
            <th>{{ 'admin.users.wallet' | translate }}</th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td><span class="status-chip" [class]="'status-chip ' + (user.role || '').toLowerCase()">{{ user.role }}</span></td>
            <td>{{ user.country || '-' }}</td>
            <td>{{ user.wallet }}</td>
            <td class="text-right">
              <a
                pButton
                severity="secondary"
                size="small"
                [label]="'common.details' | translate"
                [routerLink]="['/admin/users', user.id]"
              ></a>
            </td>
          </tr>
        </ng-template>
      </p-table>

      <app-pagination
        [page]="result()?.current_page ?? 1"
        [lastPage]="result()?.last_page ?? 1"
        [disabled]="loading()"
        (pageChange)="load($event)"
      />
    </app-data-state>
  </section>
</app-page-shell>
